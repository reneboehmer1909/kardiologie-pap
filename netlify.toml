# ============================================
# Netlify Configuration — Dr. med. Thomas Pap
# ============================================

[build]
  # The build command runs the blog generator
  command = "node build-blog.js"

  # The publish directory is the project root (all HTML lives here)
  publish = "."

# Clean URLs: /blog/bluthochdruck-tipps/ serves blog/bluthochdruck-tipps/index.html
[[redirects]]
  from = "/blog.html"
  to = "/blog/"
  status = 301
  force = true

# Old blog-post.html URLs → blog listing (catch-all for old links)
[[redirects]]
  from = "/blog-post.html"
  to = "/blog/"
  status = 301
  force = true

# ============================================
# Caching Headers (sets Expires/Cache-Control)
# ============================================

# Images: aggressive cache (filenames are stable)
[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Stylesheets and scripts
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# HTML: short cache so updates roll out quickly
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Sitemap and robots
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Security + SEO baseline headers (apply to everything)
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
